; BTC Ticker firmware for the CYD — ESP32-2432S028R
; (ESP32-WROOM-32, 2.8" ILI9341 320x240 SPI TFT, XPT2046 resistive touch)

[env:cyd]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; TLS + WiFiManager + TFT_eSPI overflow the default OTA partition table
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.1.0
    tzapu/WiFiManager@^2.0.17
    ; Software SPI for the XPT2046 — hardware VSPI + TFT_eSPI TOUCH_CS fought
    ; over the same CS pin and left touch dead on many CYD units.
    nitek/XPT2046_Bitbang_Slim@^2.0.0

build_flags =
    ; ---- TFT_eSPI wiring for the ESP32-2432S028R (single-USB CYD) ----
    ; Inverted colors -> add -D TFT_INVERSION_ON=1
    ; Do NOT define TOUCH_CS here — touch is bit-banged on its own pins
    ; (see config.h); letting TFT_eSPI own CS 33 breaks that path.
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D USE_HSPI_PORT=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    ; this unit's panel swaps red/blue (whites rendered cyan, orange rendered
    ; yellow-green) — this flag corrects the channel order at the driver level
    -D TFT_RGB_ORDER=TFT_BGR
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
