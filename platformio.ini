; BTC Ticker firmware for the CYD — ESP32-2432S028R
; (ESP32-WROOM-32, 2.8" ILI9341 320x240 SPI TFT, XPT2046 resistive touch)

[env:cyd]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; TLS + WiFiManager + TFT_eSPI overflow the default OTA partition table
board_build.partitions = huge_app.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.1.0
    tzapu/WiFiManager@^2.0.17

build_flags =
    ; ---- TFT_eSPI wiring for the ESP32-2432S028R (single-USB CYD) ----
    ; If colors look wrong on your unit: swapped red/blue -> add
    ; -D TFT_RGB_ORDER=TFT_BGR ; inverted colors -> add -D TFT_INVERSION_ON=1
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D USE_HSPI_PORT=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
